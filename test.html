<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TEST App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f0f0f0;
        }

        #container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .profile-image {
            width: 120px;
            height: 120px;
            border-radius: 40%;
            cursor: pointer;
            transition: transform 0.3s ease-in-out;
        }
		
		.profile-item.selected {
			filter: brightness(70%);
		}


        .profile-image:hover {
            transform: scale(1.1);
        }

        #celebrationModal {
            display: none;
            position: fixed;
            z-index: 1;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0, 0, 0, 0.4);
        }

        #celebrationModalContent {
            background-color: #fefefe;
            margin: 15% auto;
            padding: 20px;
            border: 1px solid #888;
            width: 80%;
            max-width: 400px;
            text-align: center;
            border-radius: 10px;
        }

        #celebrationModalClose {
            color: #aaaaaa;
            float: right;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        #celebrationModalClose:hover,
        #celebrationModalClose:focus {
            color: #000;
            text-decoration: none;
        }

        #celebrationMessage {
            font-size: 18px;
            color: green;
            margin-bottom: 20px;
        }

        #matchedListContainer {
            margin-top: 20px;
            font-size: 16px;
            text-align: left;
            display: none;
        }

        #matchedList {
            margin-top: 10px;
        }

        #showMatchedListButton {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            outline: none;
            display: none; /* Initially hidden */
        }

        #showMatchedListButton:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div id="container"></div>

    <div id="celebrationModal">
        <div id="celebrationModalContent">
            <span id="celebrationModalClose" onclick="closeCelebrationModal()">&times;</span>
            <p id="celebrationMessage"></p>
        </div>
    </div>

    <div id="matchedListContainer">
        <h2>Eşleşmeler</h2>
        <ul id="matchedList"></ul>

            { name: "AJ", imageUrl: "https://via.placeholder.com/150?text=AJ" },
        ];
        var usedANames = [];
        var usedBNames = [];
        var matchedList = [];

        // A profil resimlerini oluştur
		var container = document.getElementById("container");
		AProfiles.forEach(function(profile) {
			var profileDiv = document.createElement("div");
			profileDiv.classList.add("profile-item");
			profileDiv.dataset.name = profile.name;
			var img = document.createElement("img");
			img.src = profile.imageUrl;
			img.alt = profile.name;
			img.classList.add("profile-image");
			img.onclick = function() {
				selectProfile(this);
			};
			profileDiv.appendChild(img);
			container.appendChild(profileDiv);
		});

        function selectProfile(element) {
            var selectedName = element.alt;
            if (!usedANames.includes(selectedName)) {
                var selectedProfileDivs = document.querySelectorAll(".profile-item[data-name='" + selectedName + "']");
                selectedProfileDivs.forEach(function(div) {
                    div.classList.toggle("selected");
                });
                usedANames.push(selectedName);

                // Find a matching profile from BProfiles
                var randomIndex = Math.floor(Math.random() * BProfiles.length);
                var matchedBProfile = BProfiles[randomIndex];
                BProfiles.splice(randomIndex, 1);
                usedBNames.push(matchedBProfile.name);

                matchedList.push(selectedName + " <=> " + matchedBProfile.name);

                if (BProfiles.length === 0) {
                    document.getElementById("showMatchedListButton").style.display = "block";
                }

                // Show celebration message
                var celebrationMessage = document.getElementById("celebrationMessage");
                celebrationMessage.textContent = "Tebrikler! " + selectedName + " ve " + matchedBProfile.name + " eşleştiniz.";
                document.getElementById("celebrationModal").style.display = "block";
            }
        }

        // Tüm eşleşmeleri göster
        function showMatchedList() {
            var matchedListContainer = document.getElementById("matchedListContainer");
            var matchedListElement = document.getElementById("matchedList");

            // Temizleme
            matchedListElement.innerHTML = "";

            // Eşleşmeleri listele
            matchedList.forEach(function(item) {
                var listItem = document.createElement("li");
                listItem.textContent = item;
                matchedListElement.appendChild(listItem);
            });

            matchedListContainer.style.display = "block";
        }

        // Modal kapatma
        function closeCelebrationModal() {
            document.getElementById("celebrationModal").style.display = "none";
        }
